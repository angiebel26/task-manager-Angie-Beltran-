<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cafetería</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="app">

    <h1>Cafetería</h1>


    <div id="carrito">
      <p>Tienes <span id="cantidadCarrito">0</span> productos en tu pedido</p>
      <p>Total: $<span id="totalCarrito">0</span></p>
    </div>


    <div id="menu">
      <h2>Menú</h2>


      <div class="producto">
        <span class="nombre-producto">Café Americano</span>
        <span class="precio-producto">$3.500</span>
        <button onclick="agregarProducto('Café Americano', 3500)">Agregar</button>
      </div>

      <div class="producto">
        <span class="nombre-producto">Cappuccino</span>
        <span class="precio-producto">$4.200</span>
        <button onclick="agregarProducto('Cappuccino', 4200)">Agregar</button>
      </div>

      <div class="producto">
        <span class="nombre-producto">Croissant</span>
        <span class="precio-producto">$2.800</span>
        <button onclick="agregarProducto('Croissant', 2800)">Agregar</button>
      </div>

      <div class="producto">
        <span class="nombre-producto">Muffin de arándanos</span>
        <span class="precio-producto">$3.100</span>
        <button onclick="agregarProducto('Muffin de arándanos', 3100)">Agregar</button>
      </div>
    </div>


    <div id="acciones">
      <button id="btnFinalizar" onclick="finalizarPedido()">Finalizar pedido</button>
      <button id="btnLimpiar" onclick="limpiarPedido()">Limpiar pedido</button>
    </div>


    <div id="confirmacion" style="display:none">
      <p id="mensajeConfirmacion"></p>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
