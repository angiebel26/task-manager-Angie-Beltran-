<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>

<!-- Correcto: primero Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Fuentes -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Poppins:wght@400;500&display=swap" rel="stylesheet">

<!-- Luego tu CSS personalizado -->
<link rel="stylesheet" href="Style.css">
</head>

<body class="bg-light d-flex justify-content-center align-items-start" style="min-height: 100vh; padding-top: 40px;">

    <div class="container" style="max-width: 500px;">

        <!-- Título -->
        <h1 class="text-center fw-bold">Task Manager </h1>
        <p class="text-center mb-4">Organiza tu día</p>



        <!-- Contador -->
        <div class="text-center mb-3">
            <span class="badge fs-6">
            <span id="completadas">0</span> de 
                <span id="total">0</span> tareas completadas
            </span>
        </div>

        <!-- Formulario -->
        <div class="card p-4 shadow rounded-4 mb-4">

            <input type="text" id="nuevaTarea" class="form-control mb-3" placeholder="Escribe tu tarea...">

            <select id="categoria" class="form-select mb-3">
                <option value="">Selecciona categoría</option>
                <option value="💼 Trabajo">💼 Trabajo</option>
                <option value="🏠 Personal">🏠 Personal</option>
                <option value="🚨 Urgente">🚨 Urgente</option>
                <option value="📚 Estudio">📚 Estudio</option>
                <option value="otra">➕ Otra...</option>
            </select>

            <input type="text" id="otraCategoria" class="form-control mb-3" placeholder="Escribe tu categoría..." style="display: none;">

            <span id="error" class="text-danger small d-none">
                ⚠️ Escribe una tarea válida
            </span>

            <button onclick="agregarTarea()" class="btn btn-success w-100 mt-3 fw-bold">
                ➕ Agregar tarea
            </button>

            <div class="text-end mt-2">
                <button onclick="limpiartareasCompletadas()" class="btn btn-sm btn-outline-danger">
                    🗑️ Limpiar
                </button>
            </div>

        </div>

        <!-- Lista -->
        <div id="listaTareas" class="d-flex flex-column gap-3"></div>

    </div>

    <script src="Funciones.js"></script>

</body>
</html>
